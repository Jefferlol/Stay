<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Stacey ❤️</title>

    <meta name="description" content="Una página especial dedicada a Stacey, con todo mi amor.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <!-- Background Music -->
    <audio id="bg-music" loop preload="auto">
        <source src="Song.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Control Panel -->
    <div class="music-panel" id="music-panel">
        <button id="music-toggle" class="music-btn" aria-label="Reproducir música">
            <span class="music-icon" id="music-icon">🎵</span>
        </button>
        <div class="volume-control" id="volume-control">
            <span class="volume-label">🔊</span>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="50">
        </div>
    </div>

    <!-- Scroll Down Indicator -->
    <div id="scroll-indicator" class="scroll-indicator">
        <span>Desliza hacia abajo</span>
        <div class="scroll-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12l7 7 7-7" />
            </svg>
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Section 1: Hero with Heart -->
    <section id="hero-section" class="section hero-section">
        <main id="content">
            <div class="glass-card" data-song="Song.mp3">
                <h1 class="stagger">Te quiero <span class="accent">Stacey</span></h1>
                <p class="stagger">Eres lo más bonito que me ha pasado.</p>
                <div class="heart-icon stagger">❤️</div>
            </div>
        </main>
    </section>


    <!-- Section 2: Photo + Lyrics Pairs -->
    <section id="gallery-section" class="section gallery-section">
        <div class="gallery-header">
            <h2 class="gallery-title">Nuestros <span class="accent">Momentos</span></h2>
            <div class="title-divider"></div>
        </div>

        <!-- All pairs loaded dynamically from /api/pairs -->
        <div id="dynamic-pairs"></div>

        <!-- Final Message -->
        <div class="final-message" id="final-message" data-song="Song.mp3">
            <div class="glass-card final-card">
                <div class="final-hearts">💕</div>
                <h2 class="final-text">Te quiero, <span class="accent">Stacey</span></h2>
                <p class="final-sub">Cada momento contigo es un tesoro que guardo en mi corazón.</p>
                <div class="final-infinity">∞</div>
            </div>
        </div>
    </section>

    <!-- Floating Hearts Container -->
    <div id="floating-hearts" class="floating-hearts"></div>

    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script type="module" src="heart.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
